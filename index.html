<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jarvis AI Assistant</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#050816;
        color:white;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
    }

    .container{
        text-align:center;
    }

    .orb{
        width:180px;
        height:180px;
        border-radius:50%;
        background:radial-gradient(circle, #00ffff 0%, #001f3f 70%);
        box-shadow:
            0 0 20px #00ffff,
            0 0 60px #00ffff,
            0 0 100px #00ffff;
        margin:auto;
        animation:pulse 2s infinite;
        cursor:pointer;
    }

    @keyframes pulse{
        0%{
            transform:scale(1);
        }
        50%{
            transform:scale(1.08);
        }
        100%{
            transform:scale(1);
        }
    }

    h1{
        margin-top:30px;
        font-size:40px;
        letter-spacing:3px;
        color:#00ffff;
    }

    p{
        margin-top:15px;
        color:#cccccc;
        font-size:18px;
    }

    .status{
        margin-top:20px;
        font-size:20px;
        color:#00ff99;
    }

    .chat{
        margin-top:30px;
        width:90%;
        max-width:600px;
        margin-left:auto;
        margin-right:auto;
        text-align:left;
        background:#0c1022;
        padding:20px;
        border-radius:20px;
        height:250px;
        overflow-y:auto;
        border:1px solid #00ffff55;
    }

    .msg{
        margin-bottom:15px;
    }

    .user{
        color:#00ffff;
    }

    .ai{
        color:#00ff99;
    }

    button{
        margin-top:20px;
        padding:12px 25px;
        border:none;
        border-radius:30px;
        background:#00ffff;
        color:black;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.05);
    }
</style>
</head>

<body>

<div class="container">

    <div class="orb" id="orb"></div>

    <h1>JARVIS</h1>

    <p>AI Voice Assistant</p>

    <div class="status" id="status">
        Click orb to speak
    </div>

    <button id="startBtn">
        Start Listening
    </button>

    <div class="chat" id="chat"></div>

</div>

<script>

const statusText = document.getElementById("status");
const chat = document.getElementById("chat");
const startBtn = document.getElementById("startBtn");
const orb = document.getElementById("orb");

const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();

recognition.lang = "en-US";
recognition.continuous = true;
recognition.interimResults = true;

function addMessage(sender, text){

    const div = document.createElement("div");
    div.classList.add("msg");

    if(sender === "user"){
        div.innerHTML = `<span class="user">YOU:</span> ${text}`;
    }else{
        div.innerHTML = `<span class="ai">JARVIS:</span> ${text}`;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function speak(text){

    const speech = new SpeechSynthesisUtterance(text);

    speech.rate = 1;
    speech.pitch = 1;
    speech.volume = 1;

    speechSynthesis.speak(speech);
}

async function askAI(message){

    statusText.innerText = "Thinking...";

    /curl https://api.openai.com/v1/responses \
  -H "Content-Type: application/json" \
  -H "Authorization: Bearer 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" \
  -d '{
    "model": "gpt-5.4-mini",
    "input": "write a haiku about ai",
    "store": true
  }'
    */

    const response = await fetch(
        "https://api.openai.com/v1/chat/completions",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer YOUR_API_KEY"
            },
            body:JSON.stringify({
                model:"gpt-4.1-mini",
                messages:[
                    {
                        role:"system",
                        content:"You are Jarvis, a futuristic AI voice assistant."
                    },
                    {
                        role:"user",
                        content:message
                    }
                ]
            })
        }
    );

    const data = await response.json();

    const reply =
        data.choices[0].message.content;

    addMessage("ai", reply);

    speak(reply);

    statusText.innerText = "Ready";
}

recognition.onstart = () => {
    statusText.innerText = "Listening...";
};

recognition.onresult = async (event) => {

    const transcript =
        event.results[0][0].transcript;

    addMessage("user", transcript);

    statusText.innerText = "Processing...";

    await askAI(transcript);
};

recognition.onerror = (event) => {
    statusText.innerText =
        "Error: " + event.error;
};

function startListening(){
    recognition.start();
}
const recognition = new webkitSpeechRecognition();
recognition.start();
navigator.mediaDevices.getUserMedia({ audio: true })
);

orb.addEventListener(
    "click",
    startListening
);

</script>

</body>
</html>
